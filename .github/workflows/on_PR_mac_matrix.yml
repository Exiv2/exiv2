name: On PRs - Mac Matrix

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - "*.md"

jobs:
  MacOS:
    name: 'macOS - XCode - ${{matrix.build_type}} - SHARED:${{matrix.shared_libraries}}'
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        shared_libraries: [ON, OFF]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          brew install inih googletest

      - name: Build
        run: |
          cmake --preset base_mac -S . -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DBUILD_SHARED_LIBS=${{matrix.shared_libraries}}
          cmake --build build --parallel

      - name: Install
        run: |
          cd build
          cmake --install .

      - name: Allow Python through macOS firewall
        run: |
          PYTHON_BIN=$(python3 -c "import sys; print(sys.executable)")
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --add "$PYTHON_BIN"
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --unblockapp "$PYTHON_BIN"

      - name: Test
        run: |
          nc -l 8127 &
          python3 -m http.server 8125 --bind 127.0.0.1 &
          ctest --test-dir build --output-on-failure
